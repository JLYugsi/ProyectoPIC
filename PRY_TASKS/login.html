<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Detección Facial</title>
    <link rel="stylesheet" href="./public/vendor/bootstrap/css/bootstrap.min.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-container {
            max-width: 500px;
            width: 100%;
            padding: 2rem;
        }
        .camera-container {
            position: relative;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        #video {
            width: 100%;
            display: block;
        }
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .status-message {
            margin-top: 1rem;
            text-align: center;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .status-message.success {
            color: #28a745;
        }
        .status-message.error {
            color: #dc3545;
        }
        .status-message.info {
            color: #17a2b8;
        }
        .btn-logout {
            margin-top: 1rem;
        }
        .loading-spinner {
            display: none;
            text-align: center;
            margin: 1rem 0;
        }
        .loading-spinner.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="card">
            <div class="card-header text-center">
                <h2>🔐 Login con Detección Facial</h2>
            </div>
            <div class="card-body">
                <div class="camera-container">
                    <video id="video" autoplay playsinline></video>
                    <canvas id="canvas"></canvas>
                </div>
                
                <div class="loading-spinner" id="loadingSpinner">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Cargando modelos...</span>
                    </div>
                    <p class="mt-2">Cargando modelos de detección facial...</p>
                </div>

                <div class="status-message info" id="statusMessage">
                    Iniciando cámara...
                </div>

                <div class="text-center mt-3">
                    <button class="btn btn-primary btn-lg" id="loginBtn" disabled>
                        Iniciar Sesión
                    </button>
                </div>

                <div class="text-center btn-logout" id="logoutSection" style="display: none;">
                    <a href="index.html" class="btn btn-secondary">Volver al Dashboard</a>
                </div>
            </div>
        </div>
    </div>

    <!-- face-api.js desde CDN -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script type="module" src="./public/js/login.js"></script>
    <script src="./public/vendor/bootstrap/js/bootstrap.min.js"></script>
</body>
</html>
